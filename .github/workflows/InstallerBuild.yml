name: NXThemesInstaller
on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - SwitchThemesNX/**
      # Some C++ code is autogenerated by NxThemeTool
      - SwitchThemesCommon/**
      - NxThemeTool/**
  pull_request:
    branches: [ master ]
    paths:
      - SwitchThemesNX/**
      - SwitchThemesCommon/**
      - NxThemeTool/**
jobs:
  Build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    - name: Build symodule
      run: |
        cd ThemeSysmodule
        make -j 4
        mkdir -p ../SwitchThemesNX/romfs/sysmodule/
        cp ThemeSysmodule.nsp toolbox.json ../SwitchThemesNX/romfs/sysmodule/
    - name: Generate C++ sources
      run: |
        cd NxThemeTool
        dotnet run -- cppgen ../SwitchThemesNX/source/SwitchThemesCommon/Generated
    - name: Launch build script
      run: |
        sudo apt-get update
        sudo apt-get install -y p7zip-full
        cd $GITHUB_WORKSPACE/SwitchThemesNX/
        make all "GITVER=CI-$GITHUB_SHA" -j6
    - name: Package artifacts
      run: |
        cd $GITHUB_WORKSPACE/SwitchThemesNX/
        7z a -y -mx=7 SwitchThemesNX.elf.7z SwitchThemesNX.elf
        mkdir artifacts
        mv SwitchThemesNX.nro SwitchThemesNX.elf.7z artifacts/
    - uses: actions/upload-artifact@v4
      with:
        name: InstallerBuild
        path: ${{ github.workspace }}/SwitchThemesNX/artifacts/
